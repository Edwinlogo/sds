<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Application Form – Safe Drive Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
  :root{
    --bg:#F5F5F3;--surface:#FFFFFF;--border:rgba(0,0,0,.09);
    --text:#1A1A1A;
    --accent:#1A3D8F;--accent-h:#152F6E;
    --nav-bg:rgba(245,245,243,.88);
    --ease:.32s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"]{
    --bg:#0E1117;--surface:#1C2336;--border:rgba(255,255,255,.08);
    --text:#E8EAF0;
    --accent:#4B72D4;--accent-h:#5C82E2;
    --nav-bg:rgba(14,17,23,.92);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  
  /* HEADER FLOTANTE SIMPLIFICADO */
  .header{
    position:fixed;top:0;left:0;right:0;height:70px;
    background:var(--nav-bg);backdrop-filter:blur(18px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;z-index:100;
  }
  .header-logo img{height:40px;width:auto;transition:height var(--ease);filter:drop-shadow(0 2px 8px rgba(0,0,0,.15));}
  [data-theme="dark"] .header-logo img{filter:brightness(1.15) drop-shadow(0 2px 8px rgba(0,0,0,.5));}
  
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 18px;border-radius:8px;
    background:var(--accent);color:#fff;
    font-family:'Raleway',sans-serif;font-weight:700;font-size:.88rem;
    text-decoration:none;transition:background var(--ease);
  }
  .back-btn:hover{background:var(--accent-h);}

  /* CONTENEDOR EFICIENTE PARA EL IFRAME */
  .form-container{
    margin-top:70px; /* Compensa la altura del header flotante */
    flex:1;
    width:100%;
    height:calc(100vh - 70px);
  }
  .form-container iframe{
    width:100%;height:100%;border:none;display:block;
  }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">
    <img src="https://safedriveservice.com/wp-content/uploads/2024/08/logo-original-copia-1.png" alt="Safe Drive Services"/>
  </a>
  <a href="index.html" class="back-btn" id="backBtn">← Back to Website</a>
</header>

<div class="form-container">
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScZ1QY8i71dFQGX-NvmzfLqV6Sir4jk2LRB3V-6WUGcdTZsdA/viewform?embedded=true">Cargando…</iframe>
</div>

<script>
  // Carga las preferencias del usuario del sitio principal
  document.documentElement.setAttribute('data-theme', localStorage.getItem('sds-theme') || 'light');
  
  const lang = localStorage.getItem('sds-lang') || 'en';
  if(lang === 'es') {
    document.getElementById('backBtn').textContent = '← Volver al Sitio Web';
  }
</script>
</body>
</html>
